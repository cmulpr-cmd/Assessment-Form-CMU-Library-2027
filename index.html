<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ยินดีต้อนรับ - หน่วยสื่อสารองค์กร สำนักหอสมุด มช.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center; background:#f0f4ff; font-family:'Sarabun',sans-serif; overflow:hidden; }
        .bg { position:fixed; inset:0; background:radial-gradient(circle at 20% 30%, rgba(8,145,178,0.1) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(37,99,235,0.08) 0%, transparent 40%); z-index:-1; }
        .card { background:rgba(255,255,255,0.8); backdrop-filter:blur(20px); padding:50px 40px; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.05); width:100%; max-width:400px; text-align:center; border:1px solid rgba(255,255,255,0.5); transform:translateY(30px); opacity:0; animation:fade 0.8s forwards; }
        @keyframes fade { to { transform:translateY(0); opacity:1; } }
        img { height:65px; margin-bottom:25px; }
        h1 { font-size:24px; color:#1e293b; margin:0 0 5px; font-weight:700; }
        p { color:#64748b; font-size:14px; margin-bottom:35px; }
        .input-group { text-align:left; margin-bottom:20px; }
        label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:8px; }
        input { width:100%; padding:14px; border:1.5px solid #e2e8f0; border-radius:15px; background:#fff; font-size:15px; outline:none; transition:0.3s; box-sizing:border-box; }
        input:focus { border-color:#0891b2; box-shadow:0 0 0 4px rgba(8,145,178,0.1); }
        .btn { width:100%; padding:15px; background:linear-gradient(135deg,#0891b2,#2563eb); color:white; border:none; border-radius:15px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; margin-top:10px; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(8,145,178,0.25); }
        .forgot { background:none; border:none; color:#94a3b8; font-size:13px; margin-top:25px; cursor:pointer; }
        .status { margin-top:15px; font-size:13px; min-height:20px; font-weight:600; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <img src="logo web.png" alt="CMUL Logo">
        <h1>ลงชื่อเข้าใช้</h1>
        <p>ระบบรายงานผล หน่วยสื่อสารองค์กร</p>
        <form id="loginForm">
            <div class="input-group"><label>Username</label><input type="text" id="user" required autocomplete="off"></div>
            <div class="input-group"><label>Password</label><input type="password" id="pass" required></div>
            <button type="submit" class="btn" id="btnTxt">เข้าสู่ระบบ</button>
        </form>
        <div id="status" class="status"></div>
        <button class="forgot" onclick="handleReset()">ลืมรหัสผ่าน? (คืนค่าเริ่มต้น)</button>
    </div>

    <script src="auth.js"></script>
    <script>
        const SCRIPT_URL = "URL_APPS_SCRIPT_ที่นี่";
        let accounts = {};

        // โหลดข้อมูลแบบ GET ทะลุบล็อก
        fetch(SCRIPT_URL + "?action=getAccounts").then(r => r.json()).then(d => {
            accounts = d.accounts;
            document.getElementById('status').innerText = "ระบบพร้อมใช้งาน";
        });

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const acc = accounts[u];

            if (acc && acc.password === p) {
                sessionStorage.setItem("cc_pr_user", JSON.stringify({
                    displayName: acc.displayName,
                    role: acc.role,
                    roleLabel: acc.roleLabel
                }));
                document.getElementById('status').style.color = "#059669";
                document.getElementById('status').innerText = "สำเร็จ! กำลังไปที่ Dashboard...";
                setTimeout(() => window.location.href = "dashboard.html", 1000);
            } else {
                document.getElementById('status').style.color = "#ef4444";
                document.getElementById('status').innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
            }
        };

        async function handleReset() {
            const u = document.getElementById('user').value;
            if(!u) return alert("โปรดกรอก Username");
            if(confirm("รีเซ็ตรหัสผ่านเป็น password123?")) {
                const res = await fetch(`${SCRIPT_URL}?action=resetPassword&username=${u}`);
                const d = await res.json();
                alert(d.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
