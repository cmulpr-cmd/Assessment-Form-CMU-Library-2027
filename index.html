<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - หน่วยสื่อสารองค์กร สำนักหอสมุด มช.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0891b2;
            --secondary-blue: #2563eb;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            position: relative;
            overflow: hidden;
        }

        /* เอฟเฟกต์พื้นหลังนุ่มนวล */
        body::before {
            content: ''; position: absolute; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(8,145,178,0.1) 0%, transparent 70%);
            animation: move 20s infinite alternate;
        }
        @keyframes move { to { transform: translate(50px, 50px); } }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.6);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-box img { height: 65px; margin-bottom: 20px; }
        .logo-box h1 { font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .logo-box p { font-size: 14px; color: #64748b; margin-bottom: 35px; }

        .form-group { text-align: left; margin-bottom: 22px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(8,145,178,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(8,145,178,0.25);
        }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .status-msg { font-size: 13px; margin-top: 15px; min-height: 20px; }
        .error { color: #e11d48; }
        .loading { color: var(--primary-blue); display: none; }

        .forgot-btn {
            background: none; border: none; color: #94a3b8; font-size: 13px;
            margin-top: 25px; cursor: pointer; transition: color 0.3s;
        }
        .forgot-btn:hover { color: var(--primary-blue); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-box">
        <img src="logo web.png" alt="CMU Library Logo">
        <h1>เข้าสู่ระบบ</h1>
        <p>หน่วยสื่อสารองค์กร สำนักหอสมุด มช.</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="ระบุชื่อผู้ใช้งาน" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="ระบุรหัสผ่าน" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="submitBtn">ลงชื่อเข้าใช้</button>
    </form>

    <div id="status" class="status-msg"></div>
    <button class="forgot-btn" onclick="handleForgot()">ลืมรหัสผ่าน? (คืนค่าเริ่มต้น)</button>
</div>

<script>
    // ลิงก์ Web App ที่อัปเดตใหม่
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyih2dnx5oYYa6t3VHkJOgkjOqrRKCzZMHQjJ9Z3M-v1Uvjke6TllF4ugPzvVwqARiFsw/exec";

    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        
        statusDiv.innerHTML = '<span class="loading" style="display:inline">กำลังตรวจสอบข้อมูล...</span>';
        submitBtn.disabled = true;

        const payload = {
            action: "login",
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            // ส่งข้อมูลไปยัง Apps Script
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success) {
                // เก็บข้อมูลลง Session
                sessionStorage.setItem("cmul_session", JSON.stringify(result.user));
                statusDiv.innerHTML = '<span style="color: #059669">เข้าสู่ระบบสำเร็จ! กำลังไปที่หน้าหลัก...</span>';
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                showError(result.message || "Username หรือ Password ไม่ถูกต้อง");
            }

        } catch (error) {
            console.error("Login Error:", error);
            showError("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ โปรดตรวจสอบว่าตอน Deploy ใน Apps Script ได้เลือกสิทธิ์เป็น 'Anyone' หรือยัง");
        } finally {
            submitBtn.disabled = false;
        }
    };

    function showError(msg) {
        statusDiv.innerHTML = `<span class="error">${msg}</span>`;
    }

    async function handleForgot() {
        const user = document.getElementById('username').value;
        if (!user) {
            alert("กรุณาระบุ Username ก่อนทำการรีเซ็ตรหัสผ่าน");
            return;
        }

        if (confirm(`ยืนยันการรีเซ็ตรหัสผ่านของ ${user} เป็นค่าเริ่มต้น?`)) {
            statusDiv.innerHTML = '<span class="loading" style="display:inline">กำลังดำเนินการ...</span>';
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "reset", username: user })
                });
                const result = await res.json();
                alert(result.message);
                statusDiv.innerHTML = "";
            } catch (error) {
                alert("รีเซ็ตไม่สำเร็จ โปรดลองอีกครั้ง");
                statusDiv.innerHTML = "";
            }
        }
    }

    // ป้องกันคลิกขวาหน้า Login
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
