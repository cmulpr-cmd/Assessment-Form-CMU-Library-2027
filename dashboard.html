<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - หน่วยสื่อสารองค์กร มช.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #0891b2; --bg: #f8fafc; --border: rgba(0,0,0,0.06); }
        body { margin:0; background:var(--bg); font-family:'Sarabun',sans-serif; }
        header { background:white; padding:15px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; }
        .logo { height:45px; }
        .container { padding:40px; transition: opacity 0.4s ease; }
        .controls { display:flex; gap:15px; align-items:center; margin-bottom:30px; margin-right: 180px; margin-left: auto;}
        select { padding:10px 20px; border-radius:12px; border:1px solid #e2e8f0; outline:none; cursor:pointer; font-family:inherit; }
        
        .compare-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; display:none; }
        .col { background:white; border-radius:25px; border:1px solid var(--border); min-height:600px; display:flex; flex-direction:column; overflow:hidden; }
        .col-top { padding:20px; background:#f8fafc; border-bottom:1px solid var(--border); text-align:center; }
        .content-box { flex:1; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:14px; }
        
        .btn-comp { background:#1e293b; color:white; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:600; }
        .btn-comp:hover { background:var(--cyan); }

        #loader { position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .pen { width:120px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-30px); } }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/color/150/penguin.png" class="pen">
    <p style="margin-top:20px; font-weight:600; color:var(--cyan);">กำลังประมวลผลข้อมูล...</p>
</div>

<header>
    <img src="logo web.png" alt="CMUL" class="logo">
    <div class="controls">
        <select id="mainYear" onchange="applyYearFilter()"></select>
        <button class="btn-comp" onclick="toggleCompare()" id="btnText">โหมดเปรียบเทียบ</button>
    </div>
</header>

<div class="container" id="normalView">
    <div style="background:white; height:400px; border-radius:30px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center;">
        ภาพรวมข้อมูลปีปัจจุบัน (Dashboard หลัก)
    </div>
</div>

<div class="container compare-grid" id="compareView">
    <div class="col" id="col1"></div>
    <div class="col" id="col2"></div>
    <div class="col" id="col3"></div>
</div>

<script src="auth.js"></script>
<script>
    const currentY = 2569;
    
    // ============================================
    // ⭐ แก้ตรงนี้: วาง URL ที่ได้จาก Apps Script Deploy
    // ============================================
    const SCRIPT_URL = "function myFunction() {
 // ============================================================
// 🎯 Apps Script สำหรับ CMUL PR Dashboard
// สร้างขึ้นใหม่ - พร้อมใช้งานทันที
//
// 📋 โครงสร้าง Google Sheet ที่รองรับ:
// ต้องมี Tab ชื่อ "accounts" โครงสร้างดังนี้:
//
// ┌──────────┬──────────┬───────┬──────────┐
// │    A     │    B     │   C   │    D     │
// ├──────────┼──────────┼───────┼──────────┤
// │ Username │ Password │ Name  │ Position │  ← แถว 1 (หัวตาราง)
// │ thian    │ 1234     │ คุณ..│ ผู้ดูแล  │  ← แถว 2+
// └──────────┴──────────┴───────┴──────────┘
// ============================================================

const SHEET_NAME = "accounts"; 
const DEFAULT_PASSWORD = "password123";
const ALERT_EMAIL = "thianrawich.ph@gmail.com";

// ตำแหน่งคอลัมน์ (นับจาก 0)
const COL_USERNAME = 0;  // A
const COL_PASSWORD = 1;  // B
const COL_NAME     = 2;  // C
const COL_POSITION = 3;  // D


// ============================================================
// 🧪 ฟังก์ชันทดสอบ - Run ตัวนี้ก่อน Deploy
// ============================================================
function TEST_checkSystem() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  Logger.log("════════════════════════════════════════");
  Logger.log("📁 ชื่อไฟล์: " + ss.getName());
  Logger.log("🔗 URL: " + ss.getUrl());
  Logger.log("📑 Tab ทั้งหมด: " + ss.getSheets().map(s => s.getName()).join(" | "));
  Logger.log("════════════════════════════════════════");
  
  const sheet = findSheetByName(ss, SHEET_NAME);
  if (!sheet) {
    Logger.log("❌ ไม่พบ Tab ชื่อ '" + SHEET_NAME + "'");
    Logger.log("→ แก้ไข: สร้าง/เปลี่ยนชื่อ Tab เป็น 'accounts'");
    return;
  }
  
  Logger.log("✅ พบ Tab 'accounts'");
  const headers = sheet.getRange(1, 1, 1, 4).getValues()[0];
  Logger.log("📋 หัวตาราง: A=" + headers[0] + " | B=" + headers[1] + " | C=" + headers[2] + " | D=" + headers[3]);
  
  const accounts = getAccountsFromSheet(sheet);
  const count = Object.keys(accounts).length;
  Logger.log("👥 พบผู้ใช้ " + count + " คน:");
  Logger.log(JSON.stringify(accounts, null, 2));
  
  if (count > 0) {
    Logger.log("════════════════════════════════════════");
    Logger.log("🎉 ระบบพร้อม Deploy แล้ว!");
  }
}


// ============================================================
// 📡 Main Endpoints
// ============================================================
function doGet(e) {
  try {
    const action = e.parameter.action;
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheet = findSheetByName(ss, SHEET_NAME);
    
    if (!sheet) {
      const existingSheets = ss.getSheets().map(s => s.getName()).join(", ");
      return createJsonResponse({ 
        success: false, 
        message: "ไม่พบ Sheet '" + SHEET_NAME + "' | มีอยู่: " + existingSheets 
      });
    }

    // 1. ดึงข้อมูลบัญชี
    if (action === "getAccounts") {
      return createJsonResponse({ 
        success: true, 
        accounts: getAccountsFromSheet(sheet) 
      });
    }
    
    // 2. รีเซ็ตรหัสผ่าน
    if (action === "resetPassword") {
      const user = (e.parameter.username || "").trim().toLowerCase();
      const data = sheet.getDataRange().getValues();
      for (let i = 1; i < data.length; i++) {
        if (data[i][COL_USERNAME].toString().trim().toLowerCase() === user) {
          sheet.getRange(i + 1, COL_PASSWORD + 1).setValue(DEFAULT_PASSWORD); 
          return createJsonResponse({ 
            success: true, 
            message: "รีเซ็ตรหัสผ่านเป็น " + DEFAULT_PASSWORD + " เรียบร้อยแล้ว" 
          });
        }
      }
      return createJsonResponse({ success: false, message: "ไม่พบชื่อผู้ใช้งานในระบบ" });
    }

    // 3. ดึงรายงาน HTML
    if (action === 'getReportContent') {
      const reportSheet = findSheetByName(ss, "2026-SEO MAR-html-embed"); 
      if (!reportSheet) {
        return ContentService.createTextOutput("ไม่พบหน้าข้อมูลรายงาน")
          .setMimeType(ContentService.MimeType.TEXT);
      }
      const htmlContent = reportSheet.getRange("A1").getValue(); 
      return ContentService.createTextOutput(htmlContent)
        .setMimeType(ContentService.MimeType.TEXT);
    }

    // 4. ส่งเมลแจ้งเตือน
    if (action === "sendAlertEmail") {
      const user = e.parameter.user || "ไม่ระบุตัวตน";
      const time = new Date().toLocaleString("th-TH", {timeZone: "Asia/Bangkok"});
      MailApp.sendEmail(ALERT_EMAIL, 
        "🚨 แจ้งเตือนความปลอดภัย: พยายามสั่งพิมพ์/บันทึกหน้าจอ", 
        "ผู้ใช้งาน: " + user + "\nเวลา: " + time + "\nระบบ: PR CMUL Dashboard");
      return createJsonResponse({ success: true });
    }

    return createJsonResponse({ success: false, message: "ไม่รู้จัก action: " + action });
    
  } catch (err) {
    return createJsonResponse({ success: false, message: "Server Error: " + err.message });
  }
}

function doPost(e) {
  try {
    if (e.parameter.action === "changePassword") {
      const user = (e.parameter.username || "").trim().toLowerCase();
      const oldPass = (e.parameter.oldPassword || "").trim();
      const newPass = (e.parameter.newPassword || "").trim();
      const ss = SpreadsheetApp.getActiveSpreadsheet();
      const sheet = findSheetByName(ss, SHEET_NAME);
      
      if (!sheet) return createJsonResponse({ success: false, message: "ไม่พบ Sheet" });
      
      const data = sheet.getDataRange().getValues();
      
      for (let i = 1; i < data.length; i++) {
        if (data[i][COL_USERNAME].toString().trim().toLowerCase() === user) {
          if (data[i][COL_PASSWORD].toString().trim() === oldPass) {
            sheet.getRange(i + 1, COL_PASSWORD + 1).setValue(newPass);
            return createJsonResponse({ success: true, message: "เปลี่ยนรหัสผ่านสำเร็จ" });
          }
          return createJsonResponse({ success: false, message: "รหัสผ่านเดิมไม่ถูกต้อง" });
        }
      }
      return createJsonResponse({ success: false, message: "ไม่พบผู้ใช้" });
    }
    return createJsonResponse({ success: false, message: "ไม่รู้จัก action" });
  } catch (err) {
    return createJsonResponse({ success: false, message: "Server Error: " + err.message });
  }
}


// ============================================================
// 🛠️ Helper Functions
// ============================================================
function getAccountsFromSheet(sheet) {
  const data = sheet.getDataRange().getValues();
  const accounts = {};
  
  for (let i = 1; i < data.length; i++) {
    const user = (data[i][COL_USERNAME] || "").toString().trim().toLowerCase();
    if (user) {
      accounts[user] = {
        password:    (data[i][COL_PASSWORD] || "").toString().trim(),
        displayName: (data[i][COL_NAME]     || "").toString().trim(),
        role:        "admin",
        roleLabel:   (data[i][COL_POSITION] || "").toString().trim()
      };
    }
  }
  return accounts;
}

function findSheetByName(ss, name) {
  const targetName = name.trim().toLowerCase();
  const sheets = ss.getSheets();
  for (let i = 0; i < sheets.length; i++) {
    if (sheets[i].getName().trim().toLowerCase() === targetName) {
      return sheets[i];
    }
  }
  return null;
}

function createJsonResponse(data) {
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}
}
";
    // ============================================

    const select = document.getElementById('mainYear');
    for(let i = currentY - 3; i <= currentY + 3; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.text = "ปีงบประมาณ " + i;
        if(i === currentY) opt.selected = true;
        select.appendChild(opt);
    }

    function applyYearFilter() {
        console.log("Year changed to:", document.getElementById('mainYear').value);
    }

    function showLoader(fn) {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        setTimeout(() => {
            fn();
            loader.style.display = 'none';
        }, 1200);
    }

    function toggleCompare() {
        showLoader(() => {
            const normal = document.getElementById('normalView');
            const compare = document.getElementById('compareView');
            const btn = document.getElementById('btnText');
            
            if (compare.style.display === 'none' || !compare.style.display) {
                normal.style.display = 'none';
                compare.style.display = 'grid';
                btn.innerText = "กลับหน้าปกติ";
                [1,2,3].forEach(i => resetColumn(i));
            } else {
                normal.style.display = 'block';
                compare.style.display = 'none';
                btn.innerText = "โหมดเปรียบเทียบ";
            }
        });
    }

    function resetColumn(i) {
        const col = document.getElementById('col'+i);
        col.innerHTML = `
            <div class="col-top">
                <select id="m${i}"><option value="">เลือกเดือน</option><option value="MAR26">มีนาคม</option><option value="APR26">เมษายน</option></select>
                <button onclick="loadReport(${i})" style="margin-top:10px; background:var(--cyan); color:white; border:none; border-radius:8px; padding:5px 15px; cursor:pointer;">ดูผล</button>
            </div>
            <div class="content-box" id="content${i}">โปรดเลือกข้อมูลเพื่อเปรียบเทียบ</div>
        `;
    }

    async function loadReport(i) {
        const m = document.getElementById('m'+i).value;
        if(!m) return alert("โปรดเลือกเดือน");

        showLoader(async () => {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getReportContent&month=${m}`);
                const html = await res.text();
                
                document.getElementById('col'+i).innerHTML = `
                    <div class="col-top">
                        <div style="font-weight:700; color:var(--cyan);">${m}</div>
                        <button onclick="resetColumn(${i})" style="font-size:11px; background:#e2e8f0; border:none; padding:4px 10px; border-radius:6px; cursor:pointer; margin-top:5px;">เปลี่ยนข้อมูล</button>
                    </div>
                    <div style="flex:1; padding:10px; overflow-y:auto;">${html}</div>
                `;
            } catch (err) {
                alert("โหลดรายงานไม่สำเร็จ: " + err.message);
            }
        });
    }
</script>
</body>
</html>
