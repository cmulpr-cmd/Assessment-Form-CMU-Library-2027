<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - หน่วยสื่อสารองค์กร มช.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #0891b2; --bg: #f8fafc; --border: rgba(0,0,0,0.06); }
        body { margin:0; background:var(--bg); font-family:'Sarabun',sans-serif; }
        header { background:white; padding:15px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; }
        .logo { height:45px; }
        .container { padding:40px; transition: opacity 0.4s ease; }
        .controls { display:flex; gap:15px; align-items:center; margin-bottom:30px; margin-right: 180px; margin-left: auto;}
        select { padding:10px 20px; border-radius:12px; border:1px solid #e2e8f0; outline:none; cursor:pointer; font-family:inherit; }
        
        .compare-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; display:none; }
        .col { background:white; border-radius:25px; border:1px solid var(--border); min-height:600px; display:flex; flex-direction:column; overflow:hidden; }
        .col-top { padding:20px; background:#f8fafc; border-bottom:1px solid var(--border); text-align:center; }
        .content-box { flex:1; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:14px; }
        
        .btn-comp { background:#1e293b; color:white; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:600; }
        .btn-comp:hover { background:var(--cyan); }

        #loader { position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .pen { width:120px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-30px); } }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/color/150/penguin.png" class="pen">
    <p style="margin-top:20px; font-weight:600; color:var(--cyan);">กำลังประมวลผลข้อมูล...</p>
</div>

<header>
    <img src="logo web.png" alt="CMUL" class="logo">
    <div class="controls">
        <select id="mainYear" onchange="applyYearFilter()"></select>
        <button class="btn-comp" onclick="toggleCompare()" id="btnText">โหมดเปรียบเทียบ</button>
    </div>
</header>

<div class="container" id="normalView">
    <div style="background:white; height:400px; border-radius:30px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center;">
        ภาพรวมข้อมูลปีปัจจุบัน (Dashboard หลัก)
    </div>
</div>

<div class="container compare-grid" id="compareView">
    <div class="col" id="col1"></div>
    <div class="col" id="col2"></div>
    <div class="col" id="col3"></div>
</div>

<script src="auth.js"></script>
<script>
    const currentY = 2569;
    // ⭐ URL ใหม่ (จาก Deploy ล่าสุด - ไฟล์ assessment_backup_backend)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxr0sOK9Vc5KqJWKBvQ66NTuTHBYhA8PIsacQQ1V-yy2HLTqp5Lwvdjyd9T79xl2JuHHg/exec";

    const select = document.getElementById('mainYear');
    for(let i = currentY - 3; i <= currentY + 3; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.text = "ปีงบประมาณ " + i;
        if(i === currentY) opt.selected = true;
        select.appendChild(opt);
    }

    function applyYearFilter() {
        console.log("Year changed to:", document.getElementById('mainYear').value);
    }

    function showLoader(fn) {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        setTimeout(() => {
            fn();
            loader.style.display = 'none';
        }, 1200);
    }

    function toggleCompare() {
        showLoader(() => {
            const normal = document.getElementById('normalView');
            const compare = document.getElementById('compareView');
            const btn = document.getElementById('btnText');
            
            if (compare.style.display === 'none' || !compare.style.display) {
                normal.style.display = 'none';
                compare.style.display = 'grid';
                btn.innerText = "กลับหน้าปกติ";
                [1,2,3].forEach(i => resetColumn(i));
            } else {
                normal.style.display = 'block';
                compare.style.display = 'none';
                btn.innerText = "โหมดเปรียบเทียบ";
            }
        });
    }

    function resetColumn(i) {
        const col = document.getElementById('col'+i);
        col.innerHTML = `
            <div class="col-top">
                <select id="m${i}"><option value="">เลือกเดือน</option><option value="MAR26">มีนาคม</option><option value="APR26">เมษายน</option></select>
                <button onclick="loadReport(${i})" style="margin-top:10px; background:var(--cyan); color:white; border:none; border-radius:8px; padding:5px 15px; cursor:pointer;">ดูผล</button>
            </div>
            <div class="content-box" id="content${i}">โปรดเลือกข้อมูลเพื่อเปรียบเทียบ</div>
        `;
    }

    async function loadReport(i) {
        const m = document.getElementById('m'+i).value;
        if(!m) return alert("โปรดเลือกเดือน");

        showLoader(async () => {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getReportContent&month=${m}`);
                const html = await res.text();
                
                document.getElementById('col'+i).innerHTML = `
                    <div class="col-top">
                        <div style="font-weight:700; color:var(--cyan);">${m}</div>
                        <button onclick="resetColumn(${i})" style="font-size:11px; background:#e2e8f0; border:none; padding:4px 10px; border-radius:6px; cursor:pointer; margin-top:5px;">เปลี่ยนข้อมูล</button>
                    </div>
                    <div style="flex:1; padding:10px; overflow-y:auto;">${html}</div>
                `;
            } catch (err) {
                alert("โหลดรายงานไม่สำเร็จ: " + err.message);
            }
        });
    }
</script>
</body>
</html>
